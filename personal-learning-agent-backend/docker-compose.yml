version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/learner.db
      CHROMA_PERSIST_DIR: ./data/chroma
      USE_MOCK_LLM: "true"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
